{% load static %}<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Лантико{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0E0F14; --card:#16171E; --border:#23252F;
  --text:#C8CAD0; --muted:#6B6E7A; --accent:#A78BFA;
  --white:#F1F1F4;
  --kind:#F472B6; --will:#60A5FA; --iq:#34D399; --hon:#FBBF24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:720px;margin:0 auto;padding:0 24px}
.btn{display:inline-block;background:var(--accent);color:#0E0F14;border:none;
  border-radius:14px;padding:16px 44px;font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(167,139,250,.35)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:default;transform:none;box-shadow:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease both}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
